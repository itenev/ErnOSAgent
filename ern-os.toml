[general]
active_provider = "llamacpp"
data_dir = "data"
flux_port = 8890

[llamacpp]
server_binary = "/opt/homebrew/bin/llama-server"
port = 8080
model_path = "./models/gemma-4-26b-it-Q4_K_M.gguf"
mmproj_path = "./models/mmproj-gemma-4-26B-A4B-it-f16.gguf"
n_gpu_layers = 999
embedding_port = 8081
visual_token_budget = 560

[ollama]
base_url = "http://localhost:11434"
model = "gemma4:26b"

[openai_compat]
base_url = "http://localhost:1234/v1"
model = "gemma-4-26b-it"

[observer]
enabled = true

[web]
port = 3000
open_browser = true

[prompt]
system_prompt = "You are Ern-OS, a high-performance AI assistant with a 7-tier memory system, tool execution, and interpretability."
thinking_enabled = true

[codes]
enabled = true
port = 8443
workspace = "."

[browser]
headed = true          # true = visible Chrome window, false = headless
window_width = 1280
window_height = 900
timeout_ms = 10000

